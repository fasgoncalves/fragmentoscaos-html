<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Contador de Visitas com CounterAPI</title>
</head>
<body>
  <p>Esta página foi visitada <span id="visitas">...</span> vezes.</p>

<script>
fetch('http://snd.softelabs.pt/api/visitas/as-giga-fabricas')
  .then(res => res.json())
  .then(data => {
    document.getElementById('visitas').innerText = data.visitas;
  })
  .catch(err => {
    console.error('Erro:', err);
    document.getElementById('visitas').innerText = 'erro';
  });
</script>
</body>
</html>
